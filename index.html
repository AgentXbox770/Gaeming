<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gaeming</title>
<link rel="icon" href="gaeming.ico">
<meta property="og:title" content="gaeming">
<meta property="og:description" content="we are gaeming">
<meta property="og:type" content="website">
<meta property="og:image" content="gaeming.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body { margin:0; overflow:hidden; cursor:none; }
#crosshair {
    position: fixed;
    top: 50%; left: 50%;
    width: 20px; height: 20px;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 10;
}
#crosshair::before, #crosshair::after {
    content:""; position:absolute; background:black;
}
#crosshair::before { width:2px;height:20px;left:50%;transform:translateX(-50%);}
#crosshair::after { height:2px;width:20px;top:50%;transform:translateY(-50%);}

@media (pointer: coarse) {
    #crosshair { display: none; }
    .mobile-controls { display: block; }
    .joystick-container {
        position: fixed; bottom: 80px; left: 80px;
        width: 140px; height: 140px;
        background: rgba(30,30,40,0.7); border-radius: 50%;
        backdrop-filter: blur(8px); border: 2px solid rgba(255,255,255,0.3);
        z-index: 20;
    }
    .joystick-thumb {
        position: absolute; top: 50%; left: 50%;
        width: 60px; height: 60px;
        background: rgba(255,255,255,0.95); border-radius: 50%;
        transform: translate(-50%, -50%);
    }
    .jump-button {
        position: fixed; bottom: 80px; right: 80px;
        width: 80px; height: 80px;
        background: rgba(40,40,60,0.85); border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        color: white; font-size: 28px; border: 2px solid rgba(255,255,255,0.4);
        z-index: 20;
    }
    .action-area {
        position: fixed; bottom: 210px; right: 35px;
        width: 90px; height: 90px; border-radius: 50%;
        z-index: 20;
    }
    .action-hint {
        position: fixed; bottom: 195px; right: 40px;
        color: white; font-size: 10px;
        background: rgba(0,0,0,0.6); padding: 4px 8px;
        border-radius: 20px; white-space: nowrap;
    }
    .controls-label {
        position: fixed; bottom: 20px; left: 20px;
        color: white; background: rgba(0,0,0,0.5);
        padding: 4px 10px; border-radius: 20px; font-size: 10px;
    }
}
.mobile-controls { display: none; }
</style>
</head>

<body>
<div id="crosshair"></div>
<div class="mobile-controls">
    <div class="joystick-container" id="joystickContainer"><div class="joystick-thumb" id="joystickThumb"></div></div>
    <div class="jump-button" id="jumpButton">JUMP</div>
    <div class="action-area" id="actionArea"></div>
    <div class="action-hint">TAP=PLACE | HOLD=BREAK</div>
    <div class="controls-label">MOVE | DRAG TO LOOK</div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js';
import Stats from 'https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/libs/stats.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(25, 2, 30);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const stats = new Stats();
stats.dom.style.transform = "scale(1.5)";
stats.dom.style.transformOrigin = "top left";
document.body.appendChild(stats.dom);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(50,100,50);
scene.add(light);

const texture = new THREE.TextureLoader().load("default_block.png");
const groundMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
const placedMaterial = new THREE.MeshStandardMaterial({ map: texture });

const blocks = [];

function addBlock(x,y,z,type="placed"){
    const geo = new THREE.BoxGeometry(1,1,1);
    const mat = (type==="ground")?groundMaterial:placedMaterial;
    const cube = new THREE.Mesh(geo, mat);
    cube.position.set(x, y+0.5, z);
    scene.add(cube);
    blocks.push(cube);
    const edges = new THREE.EdgesGeometry(geo);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color:0x000000}));
    line.position.copy(cube.position);
    scene.add(line);
    cube.userData.edge = line;
}

function removeBlock(block){
    scene.remove(block);
    if(block.userData.edge) scene.remove(block.userData.edge);
    const idx = blocks.indexOf(block);
    if(idx !== -1) blocks.splice(idx,1);
}

for(let x=0;x<50;x++) for(let z=0;z<50;z++) addBlock(x,0,z,"ground");

let keys = { w: false, s: false, a: false, d: false };
let yaw = 0, pitch = 0;
let velY = 0, grounded = true;
const playerHeight = 1.8;

// KEYDOWN
document.addEventListener('keydown', e => {
    const code = e.code;
    if(code === 'KeyW') keys.w = true;
    if(code === 'KeyS') keys.s = true;
    if(code === 'KeyA') keys.a = true;
    if(code === 'KeyD') keys.d = true;
    if(code === 'Space' && grounded) { velY = 0.2; grounded = false; e.preventDefault(); }
});

// ✅ YOUR EXACT KEYUP MAPPING: W, A, S, D in that order
document.addEventListener('keyup', e => {
    const code = e.code;
    if(code === 'KeyW') keys.w = false;
    if(code === 'KeyA') keys.a = false;
    if(code === 'KeyS') keys.s = false;
    if(code === 'KeyD') keys.d = false;
});

document.addEventListener('contextmenu', e => e.preventDefault());

function isMobileTouch(){ return ('ontouchstart' in window) || navigator.maxTouchPoints > 0; }

document.body.addEventListener('click', () => {
    if(!isMobileTouch() && !document.pointerLockElement) document.body.requestPointerLock();
});

document.addEventListener('mousemove', e => {
    if(document.pointerLockElement && !isMobileTouch()){
        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;
        pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
        camera.rotation.order = 'YXZ';
        camera.rotation.set(pitch, yaw, 0);
    }
});

// MOBILE
let mobileMoveX=0, mobileMoveZ=0, dragActive=false, lastX=0, lastY=0;
const joystickDiv = document.getElementById('joystickContainer');
const thumbDiv = document.getElementById('joystickThumb');
let joyActive=false, joyCenter={x:0,y:0};
if(joystickDiv){
    joystickDiv.addEventListener('touchstart',e=>{
        e.preventDefault(); joyActive=true;
        const rect=joystickDiv.getBoundingClientRect();
        joyCenter.x=rect.left+rect.width/2; joyCenter.y=rect.top+rect.height/2;
        const update=(cx,cy)=>{
            if(!joyActive) return;
            let dx=cx-joyCenter.x, dy=cy-joyCenter.y;
            const dist=Math.min(Math.hypot(dx,dy),55);
            const angle=Math.atan2(dy,dx);
            thumbDiv.style.transform=`translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
            mobileMoveX=dx/55; mobileMoveZ=dy/55;
            if(mobileMoveX>1) mobileMoveX=1; if(mobileMoveX<-1) mobileMoveX=-1;
            if(mobileMoveZ>1) mobileMoveZ=1; if(mobileMoveZ<-1) mobileMoveZ=-1;
        };
        update(e.touches[0].clientX, e.touches[0].clientY);
        joystickDiv.addEventListener('touchmove', e2=>{ e2.preventDefault(); update(e2.touches[0].clientX, e2.touches[0].clientY); });
        joystickDiv.addEventListener('touchend', ()=>{ joyActive=false; thumbDiv.style.transform='translate(-50%, -50%)'; mobileMoveX=0; mobileMoveZ=0; });
    });
}

document.getElementById('jumpButton')?.addEventListener('touchstart',e=>{ e.preventDefault(); if(grounded){ velY=0.2; grounded=false; } });

const canvasEl = renderer.domElement;
canvasEl.addEventListener('touchstart',e=>{
    const t=e.target;
    if(!t.closest('.joystick-container') && !t.closest('.jump-button') && !t.closest('.action-area') && e.touches.length===1){
        e.preventDefault(); dragActive=true; lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
    }
});
canvasEl.addEventListener('touchmove',e=>{
    if(dragActive && e.touches.length===1){
        e.preventDefault();
        const dx=e.touches[0].clientX-lastX, dy=e.touches[0].clientY-lastY;
        yaw-=dx*0.008; pitch-=dy*0.008;
        pitch=Math.max(-Math.PI/2+0.01, Math.min(Math.PI/2-0.01, pitch));
        camera.rotation.order='YXZ'; camera.rotation.set(pitch,yaw,0);
        lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
    }
});
canvasEl.addEventListener('touchend',()=>{ dragActive=false; });

const action = document.getElementById('actionArea');
let breakTimer=null, isBreaking=false, breakInt=null;
const ray=new THREE.Raycaster();
const center=new THREE.Vector2(0,0);
function getHit(){ ray.setFromCamera(center,camera); const i=ray.intersectObjects(blocks); return i.length?i[0]:null; }
function place(){ const h=getHit(); if(h){ const p=h.point.clone().add(h.face.normal); addBlock(Math.floor(p.x),Math.floor(p.y),Math.floor(p.z),"placed"); } }
function breakBlock(){ const h=getHit(); if(h&&h.object) removeBlock(h.object); }
if(action){
    action.addEventListener('touchstart',e=>{
        e.preventDefault();
        breakTimer=setTimeout(()=>{
            isBreaking=true; breakBlock();
            breakInt=setInterval(()=>{ if(isBreaking) breakBlock(); else clearInterval(breakInt); },100);
        },300);
    });
    action.addEventListener('touchend',e=>{
        e.preventDefault();
        if(breakTimer){ clearTimeout(breakTimer); breakTimer=null; }
        if(!isBreaking) place();
        isBreaking=false;
        if(breakInt){ clearInterval(breakInt); breakInt=null; }
    });
}

function move(){
    let mx=0, mz=0;
    if(isMobileTouch()){ mx=mobileMoveX; mz=mobileMoveZ; }
    else{
        if(keys.w) mz-=1;
        if(keys.s) mz+=1;
        if(keys.a) mx-=1;
        if(keys.d) mx+=1;
        if(mx!==0 || mz!==0){ const l=Math.hypot(mx,mz); mx/=l; mz/=l; }
    }
    const forward=new THREE.Vector3(Math.sin(yaw),0,-Math.cos(yaw));
    const right=new THREE.Vector3(Math.sin(yaw+Math.PI/2),0,-Math.cos(yaw+Math.PI/2));
    const vec=new THREE.Vector3(0,0,0);
    if(mz!==0) vec.addScaledVector(forward,mz);
    if(mx!==0) vec.addScaledVector(right,mx);
    vec.multiplyScalar(0.15);
    const newPos=camera.position.clone().add(vec);
    let colliding=false;
    for(const b of blocks){
        const dx=Math.abs(newPos.x-b.position.x);
        const dy=Math.abs(newPos.y-b.position.y);
        const dz=Math.abs(newPos.z-b.position.z);
        if(dx<0.5 && dz<0.5 && dy<1){ colliding=true; break; }
    }
    if(!colliding) camera.position.add(vec);
    velY-=0.01;
    camera.position.y+=velY;
    if(camera.position.y<=playerHeight){
        camera.position.y=playerHeight;
        velY=0;
        grounded=true;
    }else{ grounded=false; }
}

// Desktop block placement
document.addEventListener('mousedown', e => {
    if(isMobileTouch()) return;
    if(!document.pointerLockElement) return;
    ray.setFromCamera(center,camera);
    const intersects = ray.intersectObjects(blocks);
    if(intersects.length===0) return;
    const hit = intersects[0];
    if(e.button===2){
        removeBlock(hit.object);
        e.preventDefault();
    }
    if(e.button===0){
        const pos = hit.point.clone().add(hit.face.normal);
        addBlock(Math.floor(pos.x), Math.floor(pos.y), Math.floor(pos.z), "placed");
    }
});

function animate(){
    requestAnimationFrame(animate);
    stats.begin();
    move();
    renderer.render(scene,camera);
    stats.end();
}
animate();

window.onresize = () => {
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
};
</script>
</body>
</html>
